<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chapter 49 to 52</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 1. Create a signup form and display form data in your web
page on submission. -->
<div class="authContainer">
      <form class="authForm">
        <h2>Jion<span class="green"> NexMart</span></h2>
        <p>Create an account to start selling</p>
        <input 
          type="name" 
          placeholder="Name" 
          id="name"
          
          required 
        />
        <input 
          type="email" 
          placeholder="Email Address" 
          id="email"
          required 
        />
        <input 
          type="password" 
          placeholder="Password" 
          id="password"
          required 
        />
        
        <button type="submit" class="authBtn">Login</button>

        
      </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
